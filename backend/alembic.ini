# Alembic 설정. 본 앱 소유 테이블만 마이그레이션 (ADR-002)
# DB URL은 env.py 에서 settings 로부터 로드 (sqlalchemy.url 미설정)

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
timezone = UTC

# 마이그레이션 파일명: 0001_<slug>.py 같은 단조증가 형식
file_template = %%(rev)s_%%(slug)s

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
